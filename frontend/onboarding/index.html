<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
  <title>BizzClaw onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name" id="brandName">BizzClaw</span>
      <span class="brand-sep" aria-hidden="true">/</span>
      <span class="brand-context">onboarding</span>
    </div>
    <div class="status" title="Your agent is standing by">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="status-text">agent · standby</span>
    </div>
  </header>
  <main class="container" id="app"></main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
