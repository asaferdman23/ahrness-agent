<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/bizzclaw-mascot.png" />
  <meta name="theme-color" content="#f5f5f5" />
  <title>Get started with BizzClaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <a class="skip-link" href="#app">Skip to setup</a>
  <header class="topbar">
    <a class="brand" href="/dashboard" aria-label="BizzClaw home">
      <span class="brand-mark" aria-hidden="true"><img src="/bizzclaw-mascot.png" alt="" width="32" height="32" /></span>
      <span class="brand-name">BizzClaw</span>
      <span class="brand-context">Get started</span>
    </a>
    <div class="status" id="setupStatus" data-state="loading" title="Checking setup status">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="status-text" id="statusText">Checking setup…</span>
    </div>
  </header>
  <main class="container" id="app"><div class="initial-loader" role="status"><span></span><p>Preparing your setup…</p></div></main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
