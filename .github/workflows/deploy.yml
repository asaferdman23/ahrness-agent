name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build Agent Live dependencies
        run: |
          npm ci --prefix vendor/agent-live
          npm run build --prefix vendor/agent-live

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build Agent Live dependencies
        run: |
          npm ci --prefix vendor/agent-live
          npm run build --prefix vendor/agent-live

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER: root@138.68.165.109
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '2222' }}
          APP_DIR: /opt/ahrness
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -p $SSH_PORT -i /tmp/deploy_key -o StrictHostKeyChecking=no"

          # rsync source + built frontend. node_modules is rebuilt on the
          # server with --omit=dev (vite not needed at runtime).
          # Root-anchor persisted-state exclusions so nested source directories
          # such as vendor/agent-live/packages/sdk/dist/store are deployed.
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '/.env' \
            --exclude '/store/' \
            --exclude '/.env.local' \
            -e "ssh -p $SSH_PORT -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            . $SERVER:$APP_DIR/

          $SSH $SERVER "cd $APP_DIR && npm ci --omit=dev && systemctl restart ahrness"
          $SSH $SERVER '
            for attempt in $(seq 1 15); do
              if systemctl is-active --quiet ahrness && \
                 curl --fail --silent --show-error --max-time 3 http://127.0.0.1:3456/ >/dev/null; then
                exit 0
              fi
              sleep 2
            done

            systemctl status ahrness --no-pager --full || true
            journalctl -u ahrness -n 80 --no-pager || true
            exit 1
          '
          rm -f /tmp/deploy_key
