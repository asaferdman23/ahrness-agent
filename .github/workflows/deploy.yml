name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER: root@138.68.165.109
          APP_DIR: /opt/ahrness
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no"

          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'store/' \
            --exclude '.env.local' \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            . $SERVER:$APP_DIR/

          $SSH $SERVER "cd $APP_DIR && npm ci --omit=dev && systemctl restart ahrness"
          rm -f /tmp/deploy_key
